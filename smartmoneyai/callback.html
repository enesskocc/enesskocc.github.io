<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SmartMoneyAI — OAuth Callback</title>
<style>
  * { box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
         margin: 0; background: #0a0a1a; color: #eaeaf4; line-height: 1.6;
         min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
  .card { max-width: 720px; width: 100%; background: #1a1a2e; border: 1px solid #2a2a3a;
          border-radius: 12px; padding: 40px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
  h1 { color: #00C853; margin: 0 0 8px; font-size: 28px; }
  .sub { color: #888; margin: 0 0 24px; }
  .label { display: block; font-size: 12px; color: #888; text-transform: uppercase;
           letter-spacing: 0.05em; margin: 16px 0 6px; }
  .value { font-family: "JetBrains Mono", Consolas, monospace; background: #0a0a1a;
           padding: 14px 16px; border-radius: 8px; border: 1px solid #2a2a3a;
           word-break: break-all; color: #FFD700; font-size: 14px; }
  .empty { color: #555; font-style: italic; }
  .btn { display: inline-block; padding: 10px 18px; background: #00C853; color: #0a0a1a;
         border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 18px; font-size: 14px; }
  .btn:hover { background: #00b04a; }
  footer { margin-top: 28px; padding-top: 18px; border-top: 1px solid #2a2a3a;
           color: #666; font-size: 13px; }
  a { color: #00C853; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .error { color: #ff5555; }
</style>
</head>
<body>
  <div class="card">
    <h1>SmartMoneyAI OAuth Callback</h1>
    <p class="sub">This page receives the TikTok OAuth authorization response.
       Copy the code below and use it to exchange for an access token.</p>

    <span class="label">Authorization code</span>
    <div class="value" id="code">—</div>

    <span class="label">State</span>
    <div class="value" id="state">—</div>

    <span class="label">Scopes granted</span>
    <div class="value" id="scopes">—</div>

    <span class="label">Error (if any)</span>
    <div class="value" id="error">—</div>

    <button class="btn" id="copyBtn">Copy code to clipboard</button>

    <footer>
      <a href="/smartmoneyai/">&larr; SmartMoneyAI home</a>
      &middot;
      <a href="/smartmoneyai/privacy-policy.html">Privacy</a>
      &middot;
      <a href="/smartmoneyai/terms-of-service.html">Terms</a>
    </footer>
  </div>

<script>
(function() {
  var qs = new URLSearchParams(window.location.search);
  function setVal(id, val) {
    var el = document.getElementById(id);
    if (val) {
      el.textContent = val;
      el.classList.remove("empty");
      if (id === "error") el.classList.add("error");
    } else {
      el.textContent = "—";
      el.classList.add("empty");
    }
  }
  var code = qs.get("code");
  var state = qs.get("state");
  var scopes = qs.get("scopes");
  var err = qs.get("error") || qs.get("error_description");
  setVal("code", code);
  setVal("state", state);
  setVal("scopes", scopes);
  setVal("error", err);

  document.getElementById("copyBtn").addEventListener("click", function() {
    if (!code) { alert("No code to copy."); return; }
    navigator.clipboard.writeText(code).then(function() {
      var btn = document.getElementById("copyBtn");
      var orig = btn.textContent;
      btn.textContent = "Copied!";
      setTimeout(function() { btn.textContent = orig; }, 1500);
    });
  });
})();
</script>
</body>
</html>
